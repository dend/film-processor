# The workflow for GITHUB_PROCESS_REPO (e.g. dend/film-processor). This public
# repo holds ONLY this workflow file; everything else (process-one.mjs, the
# library, package.json) lives in the private dend/filmshell which is checked
# out into ./filmshell/. Needs FILMSHELL_READ_TOKEN (a fine-grained PAT with
# Contents:Read on dend/filmshell only).
#
# repository_dispatch only fires workflows on the DEFAULT BRANCH of THIS repo.
# Keep this file on main.

name: process-match
run-name: process-match ${{ github.event.client_payload.matchId }}

on:
  repository_dispatch:
    types: [process-match]

permissions:
  id-token: write
  contents: read

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # OIDC FIRST so the if:failure() callback always has a token regardless
      # of where the job dies. SHA-pinned (S1).
      - name: Mint OIDC token
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        id: oidc
        with:
          script: |
            const tok = await core.getIDToken('filmshell-process');
            core.setSecret(tok);
            core.setOutput('token', tok);

      # API_ORIGIN comes from client_payload (attacker-supplied if a forged
      # dispatch ever reached this workflow). The OIDC bearer is the only
      # credential a forged origin could exfil — it's never passed to a step
      # that makes a request until this allowlist check has passed.
      # process-one.mjs ALSO validates this; the workflow-level gate is the
      # auditable line and fail-fasts before npm ci/build burn ~80s.
      - name: Validate API_ORIGIN
        shell: bash
        env:
          API_ORIGIN: ${{ github.event.client_payload.apiOrigin }}
          ALLOWED_API_ORIGINS: ${{ vars.ALLOWED_API_ORIGINS }}
        run: |
          set -u
          [ -n "${ALLOWED_API_ORIGINS}" ] || { echo "ALLOWED_API_ORIGINS repo variable not set"; exit 1; }
          case ",${ALLOWED_API_ORIGINS}," in
            *,"${API_ORIGIN}",*) echo "ok: ${API_ORIGIN}" ;;
            *) echo "API_ORIGIN '${API_ORIGIN}' not in ALLOWED_API_ORIGINS"; exit 1 ;;
          esac

      # Private library repo. The default GITHUB_TOKEN can't read another
      # private repo, so this needs a PAT with Contents:Read on dend/filmshell.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: dend/filmshell
          ref: main
          path: filmshell
          token: ${{ secrets.FILMSHELL_READ_TOKEN }}
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: filmshell/package-lock.json

      # --ignore-scripts (S12); branch-protection on main is the gate for
      # .bin/tsc (N9).
      - run: npm ci --ignore-scripts
        working-directory: filmshell
      - run: npm run build
        working-directory: filmshell

      # Run the script FROM the checked-out filmshell tree so this repo
      # holds nothing but the workflow — one less file to keep in sync.
      - run: node filmshell/tools/process-one.mjs
        env:
          MATCH_ID: ${{ github.event.client_payload.matchId }}
          API_ORIGIN: ${{ github.event.client_payload.apiOrigin }}
          ALLOWED_API_ORIGINS: ${{ vars.ALLOWED_API_ORIGINS }}
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}

      # Self-contained inline shell so it works even when checkout/build failed
      # and process-one.mjs/dist isn't on disk. The origin allowlist check is
      # load-bearing: API_ORIGIN comes from client_payload, so without it a
      # forged dispatch could exfil the OIDC bearer.
      - name: Report failure
        if: failure()
        shell: bash
        run: |
          set -u
          case ",${ALLOWED_API_ORIGINS}," in
            *,"${API_ORIGIN}",*) ;;
            *) echo "API_ORIGIN '${API_ORIGIN}' not in ALLOWED_API_ORIGINS; not posting."; exit 0 ;;
          esac
          [[ "$MATCH_ID" =~ ^[0-9a-f]{8}(-[0-9a-f]{4}){3}-[0-9a-f]{12}$ ]] || { echo "bad MATCH_ID"; exit 0; }
          NONCE="$(curl -fsS -H "authorization: Bearer ${OIDC_TOKEN}" \
            "${API_ORIGIN}/api/process/${MATCH_ID}/nonce" | jq -r .nonce 2>/dev/null || true)"
          curl -fsS -X POST -H "authorization: Bearer ${OIDC_TOKEN}" \
            -H "x-process-nonce: ${NONCE}" \
            "${API_ORIGIN}/api/process/${MATCH_ID}/fail" \
            && echo "reported" || echo "fail-report POST failed (queue row will age out)"
        env:
          MATCH_ID: ${{ github.event.client_payload.matchId }}
          API_ORIGIN: ${{ github.event.client_payload.apiOrigin }}
          ALLOWED_API_ORIGINS: ${{ vars.ALLOWED_API_ORIGINS }}
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
